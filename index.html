<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Bilardo | Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e63946; --dark: #0a0a0a; --surface: #161616; --white: #ffffff; --gray: #a0a0a0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--dark); color: var(--white); font-family: 'Montserrat', sans-serif; line-height: 1.6; }

        /* GİRİŞ EKRANI */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: transform 0.6s ease-in-out;
            border-bottom: 4px solid var(--red);
        }
        .loaded #splash { transform: translateY(-100%); }

        header { text-align: center; padding: 40px 20px; }
        .logo-text { font-weight: 800; font-size: 2.2rem; letter-spacing: -1px; margin: 0; }
        .logo-text span { color: var(--red); }

        /* WIFI KARTI */
        .wifi-box {
            margin: 0 20px 30px; background: var(--surface); padding: 20px;
            border-radius: 15px; border-left: 5px solid var(--red);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* DİKEY LİSTE YAPISI */
