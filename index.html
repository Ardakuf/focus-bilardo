<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Bilardo | Premium Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e63946; --dark: #0a0a0a; --surface: #161616; --white: #ffffff; --gray: #a0a0a0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--dark); color: var(--white); font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

        /* SPLASH */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: transform 0.8s cubic-bezier(0.7,0,0.3,1);
            border-bottom: 4px solid var(--red);
        }
        .loaded #splash { transform: translateY(-100%); }

        header { text-align: center; padding: 40px 20px; }
        .logo-text { font-weight: 800; font-size: 2.2rem; letter-spacing: -1px; }
        .logo-text span { color: var(--red); }

        /* WIFI */
        .wifi-box {
            margin: 0 20px 30px; background: var(--surface); padding: 20px;
            border-radius: 15px; border-left: 5px solid var(--red);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* MENU LIST - TEK SÜTUN (İstediğin dikey yapı) */
        .category { padding: 20px; font-weight: 800; color: var(--red); text-transform: uppercase; letter-spacing: 2px; font-size: 1rem; border-bottom: 1px solid #222; margin-bottom: 15px; }
        .menu-list { padding: 0 20px; }
        .item { 
            background: var(--surface); margin-bottom: 15px; padding: 12px; 
            border-radius: 15px; display: flex; align-items: center; gap: 15px;
            border: 1px solid #222; transition: 0.3s;
        }
        
        /* FOTOĞRAF AYARI */
        .item-img {
            width: 80px; height: 80px; border-radius: 12px;
            object-fit: cover; border: 1px solid #333;
        }

        .item-info { flex: 1; }
        .item-name { font-weight: 600; font-size: 0.95rem; display: block; margin-bottom: 4px; }
        .item-desc { font-size: 0.75rem; color: var(--gray); line-height: 1.3; }
        .price { font-weight: 800; color: var(--red); font-size: 1.1rem; }

        .insta-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin: 40px 20px; padding: 18px; border-radius: 50px;
            background: linear-gradient(45deg, #f09433, #dc2743, #bc1888);
            color: white; text-decoration: none; font-weight: 800; text-transform: uppercase; font-size: 0.8rem;
        }

        footer { text-align: center; padding: 40px; font-size: 0.7rem; color: #444; letter-spacing: 2px; line-height: 2; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-text">FOCUS <span>BİLARDO</span></div>
        <p style="color:var(--gray); font-size:0.8rem; margin: 20px 0 40px; letter-spacing: 3px;">SNOOKER & POOL CLUB</p>
        <button onclick="document.body.classList.add('loaded')" style="padding: 18px 50px; border-radius: 50px; border: none; font-weight: 800; background: var(--white); cursor: pointer; letter-spacing: 1px;">MENÜYÜ AÇ</button>
    </div>

    <header>
        <div class="logo-text">FOCUS <span>BİLARDO</span></div>

        <div style="font-size: 1.5rem;">📶</div>
    </div>

    <div class="category">Atıştırmalıklar</div>

            <div class="price">40₺</div>
