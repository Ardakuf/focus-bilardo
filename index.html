<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Bilardo | Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e63946; --dark: #0a0a0a; --surface: #161616; --white: #ffffff; --gray: #a0a0a0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--dark); color: var(--white); font-family: 'Montserrat', sans-serif; }

        /* GİRİŞ EKRANI */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: transform 0.6s ease-in-out;
            border-bottom: 4px solid var(--red);
        }
        .loaded #splash { transform: translateY(-100%); }

        header { text-align: center; padding: 40px 20px; }
        .logo-text { font-weight: 800; font-size: 2.2rem; letter-spacing: -1px; margin: 0; }
        .logo-text span { color: var(--red); }

        /* WIFI KARTI */
        .wifi-box {
            margin: 0 20px 30px; background: var(--surface); padding: 20px;
            border-radius: 15px; border-left: 5px solid var(--red);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* DİKEY LİSTE YAPISI (Senin istediğin o aşağı uzanan şık hal) */
        .category { padding: 20px; font-weight: 800; color: var(--red); text-transform: uppercase; letter-spacing: 2px; font-size: 1.1rem; }
        .menu-list { padding: 0 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .item { 
            background: var(--surface); padding: 12px; 
            border-radius: 15px; display: flex; align-items: center; gap: 15px;
            border: 1px solid #222;
        }
        
        /* GÖRSELLER */
        .item-img {
            width: 85px; height: 85px; border-radius: 12px;
            object-fit: cover; border: 1px solid #333; background: #222;
        }

        .item-info { flex: 1; }
        .item-name { font-weight: 600; font-size: 0.95rem; display: block; margin-bottom: 4px; }
        .item-desc { font-size: 0.7rem; color: var(--gray); line-height: 1.2; }
        .price { font-weight: 800; color: var(--red); font-size: 1.2rem; margin-left: 5px; }

        .insta-btn {
            display: flex; align-items: center; justify-content: center;
            margin: 40px 20px; padding: 18px; border-radius: 50px;
            background: linear-gradient(45deg, #f09433, #dc2743, #bc1888);
            color: white; text-decoration: none; font-weight: 800; text-transform: uppercase;
        }

        footer { text-align: center; padding: 40px; font-size: 0.75rem; color: #444; line-height: 2; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-text">FOCUS <span>BİLARDO</span></div>
        <button onclick="document.body.classList.add('loaded')" style="margin-top:40px; padding: 15px 40px; border-radius: 50px; border: none; font-weight: 800; background: #fff; cursor: pointer;">MENÜYÜ AÇ</button>
    </div>

    <header><div class="logo-text">FOCUS <span>BİLARDO</span></div></header>

    <div class="wifi-box">
        <div><p style="margin:0; font-size:0.7rem; color:var(--gray);">Wi-Fi Şifresi</p><h3>Focus2025</h3></div>
        <div style="font-size: 1.5rem;">📶</div>
    </div>

    <div class="category">Menü</div>
    <div class="menu-list">
        <div class="item">
            <div class="item-img" style="background-image: url('Gemini_Generated_Image_p16d8mp16d8mp16d.jpg'); background-size: cover;"></div>
            <div class="item-info"><span class="item-name">Popkek & Kekler</span><span class="item-desc">Vişne, Bitter, Muz</span></div>
            <div class="price">40₺</div>
        </div>
        <div class="item">
            <div class="item-img" style="background-image: url('Gemini_Generated_Image_8bxpea8bxpea8bxp.jpg'); background-size: cover;"></div>
            <div class="item-info"><span class="item-name">Hanımeller & Bisküvi</span><span class="item-desc">Klasik, Fındıklı</span></div>
            <div class="price">40₺</div>
        </div>
        <div class="item">
            <div class="item-img" style="background-image: url('Gemini_Generated_Image_cuqrhcuqrhcuqrhc.jpg'); background-size: cover;"></div>
            <div class="item-info"><span class="item-name">Kutu İçecekler</span><span class="item-desc">Cola, Fanta, Sprite</span></div>
            <div class="price">50₺</div>
        </div>
        <div class="item">
            <div class="item-img" style="background-image: url('Gemini_Generated_Image_4t1wu24t1wu24t1w.jpg'); background-size: cover;"></div>
            <div class="item-info"><span class="item-name">Enerji İçeceği</span><span class="item-desc">Red Bull, Monster</span></div>
            <div class="price">70₺</div>
        </div>
    </div>

    <a href="https://www.instagram.com/focusbilardo/" class="insta-btn">Instagram'da Takip Et</a>

    <footer>
        🚭 İÇERİDE SİGARA İÇMEK YASAKTIR<br>
        FOCUS BİLARDO © 2026
    </footer>

</body>
</html>
