<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Bilardo | Menü</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --surface: #1a1a1a;
            --accent: #d32f2f; /* Logo rengine uygun kırmızı */
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-color); color: var(--text-primary); margin: 0; padding-bottom: 50px; }

        header { 
            background: linear-gradient(180deg, #1a1a1a 0%, #0f0f0f 100%);
            padding: 30px 20px; text-align: center; border-bottom: 2px solid var(--accent);
        }
        .logo { max-width: 220px; height: auto; }

        .category-title { 
            padding: 25px 20px 10px; font-weight: 800; font-size: 1.2rem; 
            text-transform: uppercase; color: var(--accent); letter-spacing: 2px;
        }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }

        .menu-item { 
            background: var(--surface); border-radius: 15px; overflow: hidden; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.3s;
        }

        .item-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        
        .item-info { padding: 12px; }
        .item-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 5px; }
        .item-price { color: var(--accent); font-weight: 800; font-size: 1.1rem; }

        footer { text-align: center; padding: 30px; opacity: 0.5; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/XfXGfVj/focus-logo.png" alt="Focus Bilardo" class="logo">
</header>

<div class="category-title">Atıştırmalıklar</div>
<div class="menu-grid">
    <div class="menu-item">
        <img src="https://i.ibb.co/r2M3P0S/kek.jpg" class="item-img">
        <div class="item-info"><div class="item-name">Popkek & Kek Çeşitleri</div><div class="item-price">₺40</div></div>
    </div>
    <div class="menu-item">
        <img src="https://i.ibb.co/n7m7R0N/biskuvi.jpg" class="item-img">
        <div class="item-info"><div class="item-name">Hanımeller & Bisküvi</div><div class="item-price">₺45</div></div>
    </div>
</div>

<div class="category-title">Soğuk İçecekler</div>
<div class="menu-grid">
    <div class="menu-item">
        <img src="https://i.ibb.co/vXy0V8n/kutu-icecek.jpg" class="item-img">
        <div class="item-info"><div class="item-name">Kutu İçecekler</div><div class="item-price">₺50</div></div>
    </div>
    <div class="menu-item">
        <img src="https://i.ibb.co/WvM5GzP/enerji.jpg" class="item-img">
        <div class="item-info"><div class="item-name">Enerji İçeceği</div><div class="item-price">₺80</div></div>
    </div>
</div>

<div class="category-title">Sıcak İçecekler</div>
<div class="menu-grid">
    <div class="menu-item">
        <img src="https://i.ibb.co/9G7C3Nq/kahve.jpg" class="item-img">
        <div class="item-info"><div class="item-name">Filtre Kahve</div><div class="item-price">₺60</div></div>
    </div>
    <div class="menu-item">
        <img src="https://i.ibb.co/L9HqN7n/cay.jpg" class="item-img">
        <div class="item-info"><div class="item-name">Demleme Çay</div><div class="item-price">₺20</div></div>
    </div>
</div>

<footer>Focus Bilardo Snooker Club © 2026</footer>

</body>
</html>
